name: Publish (manual)

# Manual npm publish / re-publish of the version currently in package.json.
# Use to recover a release whose auto-publish failed (e.g. a bad NPM_TOKEN), or
# to publish out of band. Normal releases publish automatically from the
# release-please workflow when its PR is merged. Opt-in: only installed by
# `devkit init --publish`. For a private/scoped package, adjust `--access`.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

# Share the publish queue with release-please.yml so a manual run and the auto
# publish can never overlap and race to publish the same version.
concurrency:
  group: npm-publish-${{ github.repository }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      # Idempotent publish: treat ONLY npm's "cannot publish over the previously
      # published versions" 403 as a green no-op, so re-running this recovery
      # workflow when the version already exists succeeds. Every other failure
      # (bad/expired token, network, registry 5xx) still fails the run loudly.
      - name: Publish
        run: |
          set +e
          output=$(npm publish --provenance --access public 2>&1)
          status=$?
          echo "$output"
          [ $status -eq 0 ] && exit 0
          if echo "$output" | grep -qiE 'cannot publish over|EPUBLISHCONFLICT'; then
            echo "::notice::Version already on the registry — idempotent no-op."
            exit 0
          fi
          exit $status
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
