version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # TypeScript 6 breaks tsup's dts build (it sets baseUrl, which TS6 rejects
      # as a hard error) and isn't supported by typescript-eslint 8 yet. Stay on
      # 5.x until the build toolchain catches up; remove this to re-allow majors.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
    groups:
      # Keep the React runtime and its type packages in lockstep so major
      # bumps (e.g. 18 -> 19) land in one PR and never break peer resolution
      # between @types/react and @types/react-dom.
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
        update-types: [major, minor, patch]
      # Batch remaining low-risk updates into a single PR to cut noise.
      minor-and-patch:
        update-types: [minor, patch]

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
